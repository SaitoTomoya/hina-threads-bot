name: Hina Auto Post

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 JST 9:00 (UTC 0:00)
  workflow_dispatch:       # 手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: pip install -r requirements.txt

      - name: Threadsに投稿
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python post.py

      - name: 投稿履歴をコミット
        run: |
          git config user.name "hina-bot"
          git config user.email "bot@hina-bot.com"
          git add posts.json
          git diff --staged --quiet || git commit -m "投稿完了: $(date +'%Y-%m-%d')"
          git push
